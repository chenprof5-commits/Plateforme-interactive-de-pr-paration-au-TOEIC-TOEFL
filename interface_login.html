<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur la plateforme de préparation au TOEIC/TOEFL</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="loginStyle.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>Bienvenue sur la plateforme de préparation au TOEIC/TOEFL</h1>

            <!-- Affichage des erreurs -->
            <div id="error-message" class="error-message" style="display: none;"></div>

            <form id="loginForm" action="connexion.php" method="POST">
                <div class="form-group">
                    <label for="numero_INE">Numéro INE</label>
                    <input type="text" id="numero_INE" name="numero_INE" required placeholder="Votre numéro INE" />
                </div>

                <div class="form-group">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" required placeholder="Votre mot de passe" />
                </div>

                <button type="submit">Se connecter</button>
            </form>

            <p>Vous n'êtes pas encore inscrit ? <a href="interface_de_connexion.html">Inscrivez-vous ici</a></p>

            <div class="social-login">
                <a href="#" class="google-login">
                    <img src="Images/image_icone_google.webp" alt="Google" class="google-icon">
                    Se connecter avec Google
                </a>
            </div>
        </div>

        <div class="right-side-image"></div>
    </div>

    <script>
        // Validation côté client
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            const numeroINE = document.getElementById('numero_INE').value.trim();
            const motdepasse = document.getElementById('motdepasse').value.trim();
            const errorDiv = document.getElementById('error-message');

            // Masquer les erreurs précédentes
            errorDiv.style.display = 'none';

            // Validation basique
            if (!numeroINE || !motdepasse) {
                event.preventDefault();
                errorDiv.textContent = "Veuillez remplir tous les champs !";
                errorDiv.style.display = 'block';
                return false;
            }
        });

        // Vérifier s'il y a un paramètre d'erreur dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = decodeURIComponent(error);
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
