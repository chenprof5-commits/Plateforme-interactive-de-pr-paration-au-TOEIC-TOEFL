<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plateforme d'Apprentissage - Page Principale</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <div class="user-profile">
        <div class="user-avatar">
          <i class="fas fa-user"></i>
        </div>
      <h2 id="username">Utilisateur</h2>
        <p><strong>Niveau :</strong> <span class="niveau">Intermédiaire</span></p>
      </div>

      <div class="progress-section">
        <h3><i class="fas fa-chart-line"></i> Progression</h3>
        <div class="progress-bar">
          <div class="progress" style="width: 37%;"></div>
        </div>
        <span class="pourcentage">37 %</span>
      </div>

      <div class="menu">
        <div class="menu-item">
          <span class="icon"><i class="fas fa-cog"></i></span>
          <span>Paramètres</span>
        </div>
        <div class="menu-item">
          <span class="icon"><i class="fas fa-sign-out-alt"></i></span>
          <span>Déconnexion</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-container">
    <header>
      <div class="user-icon" id="userIcon">
        <i class="fas fa-user"></i>
      </div>
      <h1 id="welcomeTitle">Bienvenue !</h1>
      <h2><strong>Que voulez-vous faire aujourd'hui ?</strong></h2>
    </header>
    
    <div class="cards">
      <a href="Examen.html" class="card-link">
        <div class="card examen">
          <div class="card-content">
            <i class="fas fa-file-alt card-icon"></i>
            <span>EXAMEN</span>
          </div>
        </div>
      </a>
      <a href="Mini-test.html" class="card-link">
        <div class="card mini-test">
          <div class="card-content">
            <i class="fas fa-clipboard-check card-icon"></i>
            <span>MINI-TEST</span>
          </div>
        </div>
      </a>
      <a href="Ressources.html" class="card-link">
        <div class="card lecture">
          <div class="card-content">
            <i class="fas fa-book-open card-icon"></i>
            <span>Ressources</span>
          </div>
        </div>
      </a>
    </div>

    <div class="cards">
      <a href="qcm.html" class="card-link">
        <div class="card qcm">
          <div class="card-content">
            <i class="fas fa-question-circle card-icon"></i>
            <span>QCM</span>
          </div>
        </div>
      </a>
      <a href="video.html" class="card-link">
        <div class="card video">
          <div class="card-content">
            <i class="fas fa-play-circle card-icon"></i>
            <span>Vidéo</span>
          </div>
        </div>
      </a>
      <a href="texte-a-trou.html" class="card-link">
        <div class="card texte-a-trou">
          <div class="card-content">
            <i class="fas fa-edit card-icon"></i>
            <span>Texte à trou</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
